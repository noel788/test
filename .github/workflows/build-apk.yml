name: Build Android APK

on:
  push:
    branches: [ "main" ] # Se activa al subir cambios a la rama main2

jobs:
  build:
    runs-on: ubuntu-latest # Usa un servidor Linux en la nube

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Dar permisos de ejecución a gradlew
        run: chmod +x gradlew

      - name: Compilar APK de Release
        run: ./gradlew assembleRelease

      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/

name: Build Android APK (Capacitor completo)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependencias
        run: npm install

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Crear local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Compilar APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/
